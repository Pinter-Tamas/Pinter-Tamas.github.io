<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Angol és Német Beszédgyakorlás</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗣️</text></svg>">
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../training.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="site-name" href="../../index.html">Pintér Tamás</a>
    <nav class="site-nav">
      <a href="../../index.html">Főoldal</a>
      <a href="../index.html">Beszédgyakorlás</a>
      <a href="booking.html">Időpontfoglalás</a>
      <button class="btn-logout" onclick="auth.signOut()">Kilépés</button>
    </nav>
  </div>
</header>

<section class="training-section">
  <div class="training-inner">
    <h2 id="dashboard-title">Dashboard</h2>
    <p style="text-align:right;margin-bottom:16px;"><a href="profile.html" style="font-size:14px;font-weight:600;">Profil szerkesztése →</a></p>

    <!-- Kredit kártya -->
    <div class="dashboard-grid" style="margin-bottom:32px;">
      <div class="dashboard-card">
        <h3>Kredit egyenleg</h3>
        <div class="credit-balance" id="credit-balance">—</div>
        <div class="credit-label">kredit (1 kredit = 1 alkalom)</div>
        <div style="margin-top:16px;">
          <a href="credits.html" class="btn btn-sm btn-outline">Kredit vásárlás</a>
        </div>
      </div>
    </div>

    <!-- Gyerekek -->
    <h3 style="font-size:16px;font-weight:700;color:#111;margin-bottom:16px;">Gyerekeim</h3>
    <div id="my-students" class="loading">Betöltés…</div>

    <!-- Aktuális foglalások -->
    <h3 style="font-size:16px;font-weight:700;color:#111;margin:32px 0 16px;">Aktuális foglalások</h3>
    <div id="my-bookings" class="loading">Betöltés…</div>

    <!-- Cserék (swap board) -->
    <h3 style="font-size:16px;font-weight:700;color:#111;margin:32px 0 16px;">Cserék</h3>
    <div id="swap-board" class="loading">Betöltés…</div>

    <div style="text-align:center;margin-top:32px;">
      <a href="booking.html" class="btn btn-primary">Időpontfoglalás</a>
    </div>
  </div>
</section>

<footer class="site-footer">
  <p>© 2026 Pintér Tamás · <a href="../../index.html">pinter-tamas.github.io</a></p>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../firebase-training-config.js"></script>
<script src="../shared/session-list.js"></script>

<script>
// Auth guard
window.onTrainingAuthReady = function() {
  if (!window.trainingUser) {
    window.location.href = '../login.html';
    return;
  }
  document.getElementById('dashboard-title').textContent = 'Üdv, ' + (window.trainingUser.name || 'Szülő') + '!';
  loadDashboard();
};

function loadDashboard() {
  var uid = auth.currentUser.uid;
  loadCredits(uid);
  loadStudents(uid);
  loadBookings(uid);
  loadSwapBoard(uid);
}

// Kredit egyenleg
function loadCredits(uid) {
  db.collection('credits').doc(uid).get().then(function(doc) {
    if (doc.exists) {
      document.getElementById('credit-balance').textContent = doc.data().balance || 0;
    } else {
      document.getElementById('credit-balance').textContent = '0';
    }
  });
}

// Gyerekek listája
function loadStudents(uid) {
  var container = document.getElementById('my-students');
  db.collection('parentStudent').where('parentUid', '==', uid).get()
    .then(function(psSnapshot) {
      if (psSnapshot.empty) {
        container.innerHTML = '<p style="color:var(--text-muted);">Nincs gyerek hozzárendelve.</p>';
        return;
      }
      var promises = [];
      psSnapshot.forEach(function(psDoc) {
        var link = psDoc.data();
        var p = db.collection('students').doc(link.studentId).get().then(function(sDoc) {
          if (sDoc.exists) {
            return { id: sDoc.id, name: sDoc.data().name, age: sDoc.data().age || '', partner: sDoc.data().preferredPartner || '' };
          }
          return null;
        });
        promises.push(p);
      });
      return Promise.all(promises).then(function(students) {
        students = students.filter(function(s) { return s !== null; });
        if (students.length === 0) {
          container.innerHTML = '<p style="color:var(--text-muted);">Nincs gyerek hozzárendelve.</p>';
          return;
        }
        var html = '<div class="dashboard-grid">';
        students.forEach(function(s) {
          html += '<div class="dashboard-card">'
            + '<h3>👤 ' + escapeHtml(s.name) + '</h3>'
            + (s.age ? '<p style="font-size:14px;color:var(--text-muted);">' + escapeHtml(s.age) + ' éves</p>' : '')
            + (s.partner ? '<p style="font-size:13px;color:var(--text-muted);">Preferált partner: ' + escapeHtml(s.partner) + '</p>' : '')
            + '</div>';
        });
        html += '</div>';
        container.innerHTML = html;
      });
    });
}

// Aktuális foglalások
function loadBookings(uid) {
  var container = document.getElementById('my-bookings');
  db.collection('bookings')
    .where('parentUid', '==', uid)
    .where('status', 'in', ['confirmed', 'pending_payment'])
    .get()
    .then(function(bSnapshot) {
      if (bSnapshot.empty) {
        container.innerHTML = '<p style="color:var(--text-muted);">Nincs aktuális foglalás.</p>';
        return;
      }
      var promises = [];
      bSnapshot.forEach(function(bDoc) {
        var b = bDoc.data();
        var p = db.collection('sessions').doc(b.sessionId).get().then(function(sDoc) {
          if (sDoc.exists) {
            var s = sDoc.data();
            return {
              bookingId: bDoc.id,
              status: b.status,
              studentId: b.studentId,
              sessionDate: s.date,
              sessionTime: s.startTime + '–' + s.endTime,
              sessionType: s.type,
              sessionLocation: s.location
            };
          }
          return null;
        });
        // Student név
        var sp = db.collection('students').doc(b.studentId).get().then(function(sDoc) {
          return sDoc.exists ? sDoc.data().name : 'Ismeretlen';
        });
        promises.push(Promise.all([p, sp]));
      });
      return Promise.all(promises).then(function(results) {
        var html = '';
        results.forEach(function(r) {
          if (!r[0]) return;
          var b = r[0];
          var studentName = r[1];
          var statusClass = b.status === 'confirmed' ? 'status-confirmed' : 'status-pending';
          var statusLabel = b.status === 'confirmed' ? 'Megerősítve' : 'Fizetésre vár';
          var typeLabel = b.sessionType === 'vegyes' ? 'Angol & Német' : (b.sessionType === 'angol' ? 'Angol' : 'Német');

          html += '<div class="booking-item">'
            + '<span class="booking-status ' + statusClass + '">' + statusLabel + '</span>'
            + '<div style="font-weight:700;">' + escapeHtml(studentName) + ' — ' + escapeHtml(typeLabel) + '</div>'
            + '<div style="font-size:14px;color:var(--text-muted);">' + escapeHtml(formatDate(b.sessionDate)) + ' · ' + escapeHtml(b.sessionTime) + '</div>'
            + '<div style="font-size:13px;color:var(--text-muted);">📍 ' + escapeHtml(b.sessionLocation) + '</div>'
            + '<div style="margin-top:8px;">'
            + '<button class="btn btn-xs btn-danger" onclick="cancelBooking(\'' + b.bookingId + '\')">Lemondás</button>'
            + ' <button class="btn btn-xs btn-outline" onclick="requestSwap(\'' + b.bookingId + '\',\'' + escapeHtml(studentName) + '\')">Csere kérés</button>'
            + '</div>'
            + '</div>';
        });
        container.innerHTML = html || '<p style="color:var(--text-muted);">Nincs aktuális foglalás.</p>';
      });
    });
}

// Csere tábla
function loadSwapBoard(uid) {
  var container = document.getElementById('swap-board');
  var userEmail = window.trainingUser ? window.trainingUser.email : '';

  db.collection('bookings')
    .where('status', '==', 'swap_requested')
    .get()
    .then(function(snapshot) {
      if (snapshot.empty) {
        container.innerHTML = '<p style="color:var(--text-muted);">Nincs aktuális csere kérés.</p>';
        return;
      }
      var promises = [];
      snapshot.forEach(function(bDoc) {
        var b = bDoc.data();

        // Saját cserét ne mutassuk
        if (b.parentUid === uid) return;

        // Ha van targetEmail, csak annak mutassuk akinek szánják
        if (b.targetEmail && b.targetEmail !== userEmail) return;

        var p = Promise.all([
          db.collection('sessions').doc(b.sessionId).get(),
          db.collection('students').doc(b.studentId).get()
        ]).then(function(results) {
          var sDoc = results[0], stDoc = results[1];
          if (!sDoc.exists) return null;
          var s = sDoc.data();
          var targetLabel = b.targetEmail ? ' (kizárólag ' + escapeHtml(b.targetEmail) + ' számára)' : '';
          return {
            bookingId: bDoc.id,
            studentName: stDoc.exists ? stDoc.data().name : 'Ismeretlen',
            sessionDate: s.date,
            sessionTime: s.startTime + '–' + s.endTime,
            sessionType: s.type,
            sessionLocation: s.location,
            targetLabel: targetLabel
          };
        });
        promises.push(p);
      });
      return Promise.all(promises).then(function(items) {
        items = items.filter(function(i) { return i !== null; });
        if (items.length === 0) {
          container.innerHTML = '<p style="color:var(--text-muted);">Nincs aktuális csere kérés.</p>';
          return;
        }
        var html = '';
        items.forEach(function(item) {
          var typeLabel = item.sessionType === 'vegyes' ? 'Angol & Német' : (item.sessionType === 'angol' ? 'Angol' : 'Német');
          html += '<div class="booking-item">'
            + '<span class="booking-status status-pending">Csere</span>'
            + '<div><strong>' + escapeHtml(item.studentName) + '</strong> nem tud jönni — ' + escapeHtml(typeLabel) + '</div>'
            + '<div style="font-size:13px;color:var(--text-muted);">' + escapeHtml(formatDate(item.sessionDate)) + ' · ' + escapeHtml(item.sessionTime) + ' · ' + escapeHtml(item.sessionLocation) + item.targetLabel + '</div>'
            + '<button class="btn btn-xs btn-primary" style="margin-top:8px;" onclick="acceptSwap(\'' + item.bookingId + '\')">Átveszem</button>'
            + '</div>';
        });
        container.innerHTML = html;
      });
    });
}

// Segédfüggvény: session dátum lekérése bookingId alapján
function getSessionDateForBooking(bookingId) {
  return db.collection('bookings').doc(bookingId).get().then(function(bDoc) {
    if (!bDoc.exists) return null;
    return db.collection('sessions').doc(bDoc.data().sessionId).get().then(function(sDoc) {
      if (!sDoc.exists) return null;
      return new Date(sDoc.data().date + 'T' + sDoc.data().startTime);
    });
  });
}

// Lemondás — 24 órás korlátozás
function cancelBooking(bookingId) {
  getSessionDateForBooking(bookingId).then(function(sessionDateTime) {
    if (!sessionDateTime) {
      alert('Hiba: az óra nem található.');
      return;
    }

    var now = new Date();
    var hoursLeft = (sessionDateTime - now) / (1000 * 60 * 60);

    if (hoursLeft < 24) {
      if (!confirm('Az óra kevesebb mint 24 óra múlva kezdődik. Lemondás helyett kérj cserét (kredit visszajár, ha valaki átveszi). Folytatod lemondással? (Kredit NEM jár vissza.)')) return;
    } else {
      if (!confirm('Biztosan lemondod ezt a foglalást?')) return;
    }

    db.collection('bookings').doc(bookingId).get().then(function(bDoc) {
      if (!bDoc.exists) return;
      var booking = bDoc.data();
      var sessionId = booking.sessionId;

      // Booking státusz → cancelled
      return db.collection('bookings').doc(bookingId).update({
        status: 'cancelled',
        cancelledAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        // Eltávolítás a session enrolledStudents-ból
        return db.collection('sessions').doc(sessionId).update({
          enrolledStudents: firebase.firestore.FieldValue.arrayRemove(booking.studentId)
        });
      }).then(function() {
        // Kredit visszaírás CSAK ha > 24 óra volt
        if (booking.status === 'confirmed' && hoursLeft >= 24) {
          return db.collection('credits').doc(booking.parentUid).update({
            balance: firebase.firestore.FieldValue.increment(1),
            totalUsed: firebase.firestore.FieldValue.increment(-1),
            lastActivityAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      }).then(function() {
        alert('Foglalás lemondva.' + (hoursLeft >= 24 ? ' A kredit jóváírásra került.' : ''));
        loadDashboard();
      });
    });
  });
}

// Csere kérés — opcionális email cím
function requestSwap(bookingId, studentName) {
  var targetEmail = prompt('Kinek szeretnéd felajánlani? Ha megadod az email címét, csak ő láthatja. Ha üresen hagyod, mindenki láthatja.', '');

  var msg = 'Biztosan cserét kérsz erre az órára?';
  if (targetEmail && targetEmail.trim()) {
    msg += ' Csak ' + targetEmail.trim() + ' láthatja.';
  } else {
    msg += ' A többi résztvevő láthatja.';
  }

  if (!confirm(msg)) return;

  var updateData = {
    status: 'swap_requested'
  };
  if (targetEmail && targetEmail.trim()) {
    updateData.targetEmail = targetEmail.trim();
  } else {
    updateData.targetEmail = firebase.firestore.FieldValue.delete(); // ha volt előtte, töröljük
  }

  db.collection('bookings').doc(bookingId).update(updateData).then(function() {
    alert('Csere kérés elküldve.' + (targetEmail && targetEmail.trim() ? ' Csak ' + targetEmail.trim() + ' láthatja.' : ''));
    loadDashboard();
  });
}

// Segédfüggvény: átvevő gyerekeinek lekérése (1 gyereknél nincs prompt)
function getMyStudents(uid) {
  return db.collection('parentStudent').where('parentUid', '==', uid).get().then(function(psSnap) {
    var promises = [];
    psSnap.forEach(function(psDoc) {
      promises.push(
        db.collection('students').doc(psDoc.data().studentId).get().then(function(sDoc) {
          return sDoc.exists ? { id: sDoc.id, name: sDoc.data().name } : null;
        })
      );
    });
    return Promise.all(promises).then(function(students) {
      return students.filter(function(s) { return s !== null; });
    });
  });
}

// Csere elfogadás — fix sorrend + auto-detect 1 gyerek
function acceptSwap(swapBookingId) {
  if (!confirm('Biztosan átveszed ezt az időpontot? Egy kredit levonásra kerül.')) return;
  var uid = auth.currentUser.uid;
  var parent = window.trainingUser;

  // 1. Ellenőrizzük a kreditet (Stripe-nál)
  if (parent.paymentMethod !== 'cash' && parent.paymentMethod !== 'bank_transfer') {
    db.collection('credits').doc(uid).get().then(function(cDoc) {
      if (!cDoc.exists || cDoc.data().balance < 1) {
        if (confirm('Nincs elég kredited. Szeretnél most vásárolni (10.000 Ft = 4 kredit)?')) {
          window.location.href = 'credits.html';
        }
        return;
      }
      proceedAcceptSwap(swapBookingId, uid);
    });
  } else {
    proceedAcceptSwap(swapBookingId, uid);
  }
}

function proceedAcceptSwap(swapBookingId, uid) {
  // 2. Lekérjük az eredeti booking adatait + átvevő gyerekeit
  var originalBooking, targetSession;

  db.collection('bookings').doc(swapBookingId).get().then(function(bDoc) {
    originalBooking = bDoc.data();
    return db.collection('sessions').doc(originalBooking.sessionId).get();
  }).then(function(sDoc) {
    targetSession = sDoc.data();
    return getMyStudents(uid);
  }).then(function(myStudents) {
    if (myStudents.length === 0) {
      alert('Nincs gyerek hozzárendelve a fiókodhoz.');
      return Promise.reject('cancelled');
    }

    // Auto-detect ha 1 gyerek
    var studentUid;
    if (myStudents.length === 1) {
      studentUid = myStudents[0].id;
    } else {
      var names = myStudents.map(function(s) { return s.name; }).join(', ');
      var name = prompt('Melyik gyereked veszi át az időpontot? (' + names + ')');
      if (!name) return Promise.reject('cancelled');

      var found = myStudents.filter(function(s) { return s.name.toLowerCase() === name.trim().toLowerCase(); });
      if (found.length === 0) {
        alert('Nem található ilyen nevű gyerek.');
        return Promise.reject('cancelled');
      }
      studentUid = found[0].id;
    }

    // 3. Új booking létrehozása
    return db.collection('bookings').add({
      parentUid: uid,
      studentId: studentUid,
      sessionId: originalBooking.sessionId,
      status: 'confirmed',
      bookedAt: firebase.firestore.FieldValue.serverTimestamp(),
      creditTransactionId: 'swap_' + swapBookingId
    }).then(function() {
      // Session-ba beír
      return db.collection('sessions').doc(originalBooking.sessionId).update({
        enrolledStudents: firebase.firestore.FieldValue.arrayUnion(studentUid)
      });
    }).then(function() {
      // 4. Átvevő kredit levonás
      return db.collection('credits').doc(uid).get().then(function(cDoc) {
        if (cDoc.exists) {
          return db.collection('credits').doc(uid).update({
            balance: firebase.firestore.FieldValue.increment(-1),
            totalUsed: firebase.firestore.FieldValue.increment(1),
            lastActivityAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        } else {
          return db.collection('credits').doc(uid).set({
            balance: -1,
            totalPurchased: 0,
            totalUsed: 1,
            lastActivityAt: firebase.firestore.FieldValue.serverTimestamp(),
            transactions: [{
              type: 'swap',
              amount: -1,
              reason: 'Csere átvétel (készpénz, fizetés előtt)',
              date: new Date().toISOString()
            }]
          });
        }
      });
    }).then(function() {
      // 5. VÉGÜL: régi booking cancelled + eredeti usernek kredit vissza
      return db.collection('bookings').doc(swapBookingId).update({
        status: 'cancelled',
        cancelledAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        return db.collection('credits').doc(originalBooking.parentUid).update({
          balance: firebase.firestore.FieldValue.increment(1),
          totalUsed: firebase.firestore.FieldValue.increment(-1),
          lastActivityAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }).then(function() {
        return db.collection('sessions').doc(originalBooking.sessionId).update({
          enrolledStudents: firebase.firestore.FieldValue.arrayRemove(originalBooking.studentId)
        });
      });
    });
  }).then(function() {
    alert('Időpont átvéve!');
    loadDashboard();
  }).catch(function(err) {
    if (err !== 'cancelled') {
      console.error(err);
      alert('Hiba történt a csere során.');
    }
  });
}
</script>

</body>
</html>
